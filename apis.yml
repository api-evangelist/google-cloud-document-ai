name: Google Cloud Document AI
description: >-
  Google Cloud Document AI uses machine learning to automatically classify,
  extract, and enrich data from documents. It processes scanned and digital
  documents including forms, invoices, receipts, and contracts, transforming
  unstructured content into structured, actionable data.
